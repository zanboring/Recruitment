server:
  port: 8080

spring:
  application:
    name: recruitment-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/recruitment_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    hikari:
      # 不在启动阶段就因数据库不可用而直接失败，保证应用可启动
      initializationFailTimeout: 0
      maximumPoolSize: 10
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

mybatis:
  type-aliases-package: com.example.recruitment.entity
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

logging:
  level:
    root: info
    com.example.recruitment: debug
  file:
    name: logs/recruitment-system.log

